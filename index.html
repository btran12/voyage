<style>
  :root {
    --bg: #f5f2ec;
    --surface: #ffffff;
    --surface2: #f0ece3;
    --border: rgba(0,0,0,0.09);
    --accent: #9a6f2e;
    --accent2: #2e7fa0;
    --accent3: #3a8c3d;
    --danger: #b04040;
    --text: #1a1612;
    --muted: #7a6e60;
    --card-glow: rgba(154,111,46,0.05);
    --grid-line: rgba(154,111,46,0.06);
    --select-bg: #ffffff;
    --transition: background 0.35s ease, color 0.35s ease, border-color 0.35s ease;
  }
  html.dark {
    --bg: #0a0c10;
    --surface: #11141a;
    --surface2: #181c24;
    --border: rgba(255,255,255,0.07);
    --accent: #c9a96e;
    --accent2: #7eb8d4;
    --accent3: #9ecfa0;
    --danger: #d47e7e;
    --text: #e8e4dc;
    --muted: #6b7280;
    --card-glow: rgba(201,169,110,0.06);
    --grid-line: rgba(201,169,110,0.03);
    --select-bg: #11141a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: var(--transition);
  }
  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
    transition: var(--transition);
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 6px;
    color: var(--accent);
    text-transform: uppercase;
  }
  .logo span { font-style: italic; color: var(--text); }
  .tagline {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── COUNTRY SELECTOR HERO ── */
  .selector-hero {
    position: relative;
    z-index: 10;
    padding: 48px 40px 36px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 24px;
    align-items: end;
    max-width: 1400px;
    margin: 0 auto;
  }
  .country-block label {
    display: block;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .country-select-wrapper {
    position: relative;
  }
  .country-select-wrapper .flag {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    pointer-events: none;
  }
  .country-select-wrapper select {
    width: 100%;
    appearance: none;
    background: var(--select-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 300;
    padding: 14px 40px 14px 48px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.35s ease, color 0.35s ease;
  }
  .country-select-wrapper select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .arrow-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding-bottom: 14px;
  }
  .arrow-icon {
    font-size: 28px;
    color: var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .arrow-label { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

  /* ── DASHBOARD GRID ── */
  .dashboard {
    position: relative;
    z-index: 10;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 40px 60px;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 16px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s, background 0.35s ease;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--card-glow);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .card:hover { border-color: rgba(201,169,110,0.2); transform: translateY(-1px); }
  .card:hover::before { opacity: 1; }
  .card-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .card-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    line-height: 1;
    color: var(--text);
  }
  .card-value.mono {
    font-family: 'DM Mono', monospace;
    font-size: 32px;
    font-weight: 300;
  }
  .card-sub { font-size: 12px; color: var(--muted); margin-top: 8px; }
  .accent { color: var(--accent); }
  .accent2 { color: var(--accent2); }
  .accent3 { color: var(--accent3); }

  /* grid spans */
  .span-4 { grid-column: span 4; }
  .span-3 { grid-column: span 3; }
  .span-6 { grid-column: span 6; }
  .span-8 { grid-column: span 8; }
  .span-12 { grid-column: span 12; }

  /* ── CLOCK CARD ── */
  .dual-clock {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 16px;
    align-items: center;
  }
  .clock-face { text-align: center; }
  .clock-time {
    font-family: 'DM Mono', monospace;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 2px;
  }
  .clock-date { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .clock-city { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-top: 8px; }
  .clock-divider {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .clock-divider span { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .time-diff {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    color: var(--accent);
  }
  @media (max-width: 540px) {
    .dual-clock {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto auto;
      gap: 0;
    }
    .clock-face { padding: 14px 0; }
    .clock-face:first-child {
      border-bottom: 1px solid var(--border);
    }
    .clock-time { font-size: 28px; }
    .clock-divider {
      flex-direction: row;
      justify-content: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .clock-divider span:first-child { display: none; }
    .clock-divider span:last-child { display: none; }
  }

  /* ── CURRENCY CARD ── */
  .currency-converter {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .currency-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
  }
  .currency-code {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    min-width: 36px;
    font-weight: 400;
  }
  .currency-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 300;
    outline: none;
  }
  .currency-name { font-size: 11px; color: var(--muted); }
  .rate-line {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    font-family: 'DM Mono', monospace;
  }
  .swap-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 32px; height: 32px;
    cursor: pointer;
    color: var(--accent);
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    align-self: center;
    transition: background 0.2s;
    margin: 0 auto;
  }
  .swap-btn:hover { background: var(--surface2); }

  /* ── WEATHER CARD ── */
  .weather-main {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
  }
  .weather-icon { font-size: 52px; line-height: 1; }
  .weather-temp {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px;
    font-weight: 300;
  }
  .weather-info { flex: 1; }
  .weather-desc { font-size: 14px; color: var(--muted); text-transform: capitalize; }
  .weather-loc { font-size: 11px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
  .weather-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .weather-stat {
    background: var(--surface2);
    border-radius: 6px;
    padding: 10px;
    text-align: center;
  }
  .weather-stat-val { font-family: 'DM Mono', monospace; font-size: 16px; color: var(--accent2); }
  .weather-stat-label { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

  /* ── PACKING LIST / TIPS ── */
  .tips-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .tips-list li {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }
  .tips-list li .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 6px;
    flex-shrink: 0;
  }

  /* ── PHRASE CARD ── */
  .phrase-grid { display: flex; flex-direction: column; gap: 10px; }
  .phrase-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border-radius: 6px;
    padding: 10px 14px;
    gap: 12px;
  }
  .phrase-en { font-size: 12px; color: var(--muted); min-width: 100px; }
  .phrase-local {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--text);
    text-align: right;
  }
  .phrase-pronun { font-size: 10px; color: var(--accent); font-style: italic; text-align: right; }

  /* ── EMERGENCY CARD ── */
  .emergency-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .emergency-item {
    background: var(--surface2);
    border: 1px solid rgba(212, 126, 126, 0.15);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .emergency-num {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    color: var(--danger);
  }
  .emergency-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  /* ── VISA STATUS CARD ── */
  .visa-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 40px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 12px;
  }
  .visa-ok { background: rgba(158, 207, 160, 0.12); border: 1px solid rgba(158,207,160,0.3); color: var(--accent3); }
  .visa-warn { background: rgba(201,169,110,0.12); border: 1px solid rgba(201,169,110,0.3); color: var(--accent); }
  .visa-req { background: rgba(212,126,126,0.12); border: 1px solid rgba(212,126,126,0.3); color: var(--danger); }
  .visa-details { font-size: 12px; color: var(--muted); line-height: 1.7; }

  /* ── POWER / PLUG CARD ── */
  .plug-info { display: flex; align-items: center; gap: 16px; }
  .plug-icon { font-size: 40px; }
  .plug-details { font-size: 13px; color: var(--muted); line-height: 1.8; }
  .plug-highlight { color: var(--accent2); font-family: 'DM Mono', monospace; }

  /* ── FLIGHT INFO ── */
  .flight-bar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    text-align: center;
  }
  .flight-airport { font-family: 'DM Mono', monospace; font-size: 30px; color: var(--accent); }
  .flight-city { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .flight-line {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: var(--muted);
    font-size: 11px;
  }
  .flight-arrow { font-size: 20px; color: var(--accent2); }

  /* ── LOADING ── */
  .loading {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── SECTION DIVIDER ── */
  .section-title {
    grid-column: span 12;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 8px;
  }
  .section-title::before, .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── UNIT TOGGLE ── */
  .unit-toggle {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }
  .unit-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .unit-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a0c10;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    grid-column: span 12;
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 10px 0;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent3); display: inline-block; margin-right: 4px; }

  /* ── TRANSLATOR CARD ── */
  .translator-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 300;
    padding: 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s, background 0.35s ease, color 0.35s ease;
    min-height: 90px;
  }
  .translator-input:focus { border-color: var(--accent); }
  .translator-input::placeholder { color: var(--muted); }
  .translate-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
    padding: 11px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin: 10px 0;
  }
  html.dark .translate-btn { color: #0a0c10; }
  .translate-btn:hover { opacity: 0.85; }
  .translate-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .translator-result {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    min-height: 90px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    color: var(--text);
    line-height: 1.5;
    position: relative;
    transition: background 0.35s ease;
  }
  .translator-result.empty { font-family: 'Outfit', sans-serif; font-size: 13px; color: var(--muted); font-style: italic; }
  .translator-lang-tag {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Outfit', sans-serif;
    margin-bottom: 6px;
    display: block;
  }
  .copy-btn {
    position: absolute;
    top: 10px; right: 10px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 13px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .translator-history {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 12px;
    max-height: 160px;
    overflow-y: auto;
  }
  .history-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-en { font-size: 11px; color: var(--muted); }
  .history-local { font-size: 14px; color: var(--text); font-family: 'Cormorant Garamond', serif; }

  /* ── TOP SPOTS CARD ── */
  .spots-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .spot-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;

    height: 28px;

  .theme-switch-track {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: background 0.35s ease, border-color 0.35s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 7px;

    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    border-radius: 50%;

// THEME
// ═══════════════════════════════════════
function toggleTheme(isDark) {
  document.documentElement.classList.toggle('dark', isDark);
  document.getElementById('theme-label').textContent = isDark ? 'Dark' : 'Light';
  localStorage.setItem('voyage-theme', isDark ? 'dark' : 'light');
}
// Restore saved theme (default = light, no class needed)
(function() {
  const saved = localStorage.getItem('voyage-theme');
  if (saved === 'dark') {
    document.documentElement.classList.add('dark');
    window.addEventListener('DOMContentLoaded', () => {
      const cb = document.getElementById('theme-checkbox');
      if (cb) { cb.checked = true; document.getElementById('theme-label').textContent = 'Dark'; }
    });
  }
})();

  SGD: 1.35, THB: 35, VND: 24500, INR: 83, BRL: 4.97, AED: 3.67, KRW: 1320, MXN: 17.1,

function getRate(fromCur, toCur) {
  const f = RATES_USD[fromCur] || 1;
  const t = RATES_USD[toCur] || 1;
  return t / f;
}

function getVisaStatus(home, visit) {
  if (home.code === visit.code) return { cls: 'visa-ok', icon: '✓', text: 'You are home!', detail: '' };
  const v = visit.visa;
  // Some hardcoded logic
  const freeFromUS = ['FR','DE','IT','ES','GB','JP','AU','CA','MX','BR','NL','CH','SG','KR','VN','TH','AE'];
  const freeFromGB = ['FR','DE','IT','ES','JP','AU','CA','NL','CH','SG','KR','VN','TH','AE','BR','MX'];
  const requiresFromAll = [];

  if (v.default === 'free') {
    return { cls: 'visa-ok', icon: '✓', text: 'Visa Not Required', detail: v.text };
  } else if (v.default === 'voa') {
    return { cls: 'visa-warn', icon: '⚡', text: 'Visa / ETA Required', detail: v.text };

    return { cls: 'visa-req', icon: '⚠', text: 'Visa Required', detail: v.text };

}

async function fetchWeather(countryCode) {
  const coord = CITY_COORDS[countryCode];
  if (!coord) return null;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${coord.lat}&longitude=${coord.lon}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&daily=temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=1`;
    const r = await fetch(url);
    const d = await r.json();
    return { ...d, city: coord.city };
  } catch { return null; }
}

function cToF(c) { return Math.round(c * 9/5 + 32); }
function displayTemp(c) { return weatherUnit === 'C' ? `${Math.round(c)}°C` : `${cToF(c)}°F`; }

function formatTime(tz) {
  try {
    return new Date().toLocaleTimeString('en-US', { timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  } catch { return '--:--:--'; }
}
function formatDate(tz) {
  try {
    return new Date().toLocaleDateString('en-US', { timeZone: tz, weekday: 'long', month: 'short', day: 'numeric' });
  } catch { return ''; }
}
function getTimeDiff(tz1, tz2) {
  try {
    const now = new Date();
    const t1 = new Date(now.toLocaleString('en-US', { timeZone: tz1 }));
    const t2 = new Date(now.toLocaleString('en-US', { timeZone: tz2 }));
    const diffH = (t2 - t1) / 3600000;
    const h = Math.round(diffH);
    if (h === 0) return 'Same time';
    return `${h > 0 ? '+' : ''}${h}h`;
  } catch { return '?'; }
}

let homeAmount = 100;
let swapped = false;

function convertCurrency() {
  const home = getHome(), visit = getVisit();
  const fromCur = swapped ? visit.currency : home.currency;
  const toCur = swapped ? home.currency : visit.currency;
  const rate = getRate(fromCur, toCur);
  const el = document.getElementById('currency-result');
  if (el) el.value = (homeAmount * rate).toFixed(2);
}

// PACKING TIPS
// ═══════════════════════════════════════
function getPackingTips(home, visit) {
  const tips = [];
  // Plug adapter
  if (home.plug !== visit.plug) tips.push(`Bring a Type ${visit.plug} plug adapter — plugs differ from home.`);
  // Voltage
  const homeV = parseInt(home.voltage); const visitV = parseInt(visit.voltage);
  if (Math.abs(homeV - visitV) > 20) tips.push(`Check device compatibility — ${visit.name} uses ${visit.voltage}.`);
  // Driving
  if (home.drives !== visit.drives) tips.push(`Traffic drives on the ${visit.drives} — stay alert when crossing roads.`);
  // Climate tips based on country
  const tropical = ['TH','VN','SG','IN','BR','MX'];
  const cold = ['JP','CA','DE','CH','NO'];
  if (tropical.includes(visit.code)) tips.push('Pack lightweight, breathable clothing. Humidity can be high.');
  if (cold.includes(visit.code)) tips.push('Layer up — temperatures can drop significantly, especially at night.');
  // Language
  if (home.lang !== visit.lang && visit.lang !== 'English') tips.push(`Learn basic ${visit.lang} phrases — locals appreciate the effort!`);
  // Currency cash
  tips.push(`Keep some ${visit.currency} cash handy — not all venues accept cards.`);
  tips.push('Store passport/visa copies in cloud storage as a backup.');
  tips.push('Check travel insurance coverage before departure.');
  if (tips.length < 4) tips.push('Download offline maps for the destination city.');
  return tips.slice(0, 6);
}

function updateWeatherDisplay(temp, wind, humid) {
  // update unit toggle buttons
  document.querySelectorAll('.unit-btn').forEach((btn, i) => {
    btn.className = 'unit-btn' + (i === (weatherUnit==='C'?0:1) ? ' active' : '');
  });
  document.querySelectorAll('.weather-stat-val')[0] && (document.querySelectorAll('.weather-stat-val')[0].textContent = `${wind} km/h`);
  document.querySelectorAll('.weather-stat-val')[1] && (document.querySelectorAll('.weather-stat-val')[1].textContent = `${humid}%`);
  document.querySelectorAll('.weather-stat-val')[2] && (document.querySelectorAll('.weather-stat-val')[2].textContent = displayTemp(temp - 2));
  const tempEl = document.querySelector('.weather-temp');
  if (tempEl) tempEl.textContent = displayTemp(temp);
}

// ═══════════════════════════════════════
// TRANSLATION
// ═══════════════════════════════════════
const LANG_CODES = {
  US: 'en', GB: 'en', AU: 'en', CA: 'en',
  JP: 'ja', FR: 'fr', DE: 'de', IT: 'it', ES: 'es',
  TH: 'th', VN: 'vi', SG: 'zh', MX: 'es', IN: 'hi',
  BR: 'pt', AE: 'ar', KR: 'ko', NL: 'nl', CH: 'de',
};

let translationHistory = [];

async function doTranslate() {
  const input = document.getElementById('translate-input');
  const output = document.getElementById('translate-output');
  const btn = document.getElementById('translate-btn');
  const text = input.value.trim();
  if (!text) return;

  const visit = getVisit();
  const targetLang = LANG_CODES[visit.code] || 'en';
  if (targetLang === 'en') {
    output.className = 'translator-result';
    output.innerHTML = `<span class="translator-lang-tag">Note</span>The destination language is English — no translation needed!`;
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span style="animation:blink 0.8s infinite;display:inline-block">⏳</span> Translating…';
  output.className = 'translator-result empty';
  output.textContent = 'Translating…';

  try {
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${targetLang}`;
    const res = await fetch(url);
    const data = await res.json();
    const translated = data.responseData?.translatedText;

    if (translated && data.responseStatus === 200) {
      output.className = 'translator-result';
      output.innerHTML = `
        <span class="translator-lang-tag">${visit.lang}</span>
        <span id="translated-text">${translated}</span>
        <button class="copy-btn" onclick="copyTranslation()" title="Copy">⎘ Copy</button>
      `;
      // Add to history
      translationHistory.unshift({ en: text, local: translated, lang: visit.lang });
      if (translationHistory.length > 10) translationHistory.pop();
      renderHistory();
    } else {
      output.className = 'translator-result empty';
      output.textContent = '⚠ Translation failed. Try again or check your connection.';
    }
  } catch {
    output.className = 'translator-result empty';
    output.textContent = '⚠ Could not reach translation service. Check your connection.';
  }

  btn.disabled = false;
  const visit2 = getVisit();
  btn.innerHTML = `<span>↓</span> Translate to ${visit2.lang}`;
}

function copyTranslation() {
  const el = document.getElementById('translated-text');
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = document.querySelector('.copy-btn');
    if (btn) { btn.textContent = '✓ Copied'; setTimeout(() => btn.textContent = '⎘ Copy', 1500); }
  });
}

function renderHistory() {
  const el = document.getElementById('translation-history');
  if (!el || translationHistory.length === 0) return;
  el.innerHTML = translationHistory.map((item, i) => `
    <div class="history-item" onclick="reuseTranslation(${i})">
      <div class="history-en">${item.en}</div>
      <div class="history-local">${item.local} <span style="font-size:10px;color:var(--muted);font-family:'Outfit',sans-serif">(${item.lang})</span></div>
    </div>
  `).join('');
}

function reuseTranslation(i) {
  const item = translationHistory[i];
  if (!item) return;
  const input = document.getElementById('translate-input');
  if (input) input.value = item.en;
}

// Allow Ctrl+Enter / Cmd+Enter to translate
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    const input = document.getElementById('translate-input');
    if (document.activeElement === input) doTranslate();
  }
});


async function updateDashboard() {
  const home = getHome(), visit = getVisit();
  document.getElementById('home-flag').textContent = home.flag;
  document.getElementById('visit-flag').textContent = visit.flag;
  // Persist selections
  localStorage.setItem('voyage-home', home.code);
  localStorage.setItem('voyage-visit', visit.code);
  weatherData = null;
  buildDashboard(null);
  const weather = await fetchWeather(visit.code);
  weatherData = weather;
  buildDashboard(weather);
}

// ── POPULATE SELECTS
function populateSelects() {
  const sorted = [...COUNTRIES].sort((a,b) => a.name.localeCompare(b.name));
  const homeEl = document.getElementById('home-country');
  const visitEl = document.getElementById('visit-country');
  sorted.forEach(c => {
    homeEl.innerHTML += `<option value="${c.code}">${c.flag} ${c.name}</option>`;
    visitEl.innerHTML += `<option value="${c.code}">${c.flag} ${c.name}</option>`;
  });
  // Restore saved selections, fall back to defaults
  const savedHome = localStorage.getItem('voyage-home');
  const savedVisit = localStorage.getItem('voyage-visit');
  homeEl.value = (savedHome && COUNTRIES.find(c => c.code === savedHome)) ? savedHome : 'US';
  visitEl.value = (savedVisit && COUNTRIES.find(c => c.code === savedVisit)) ? savedVisit : 'VN';
}

// ── CLOCK TICK
function tickClocks() {
  const homeClk = document.getElementById('home-clock');
  const visitClk = document.getElementById('visit-clock');
  const homeDate = document.getElementById('home-date');
  const visitDate = document.getElementById('visit-date');
  if (homeClk && visitClk) {
    const home = getHome(), visit = getVisit();
    homeClk.textContent = formatTime(home.tz);
    visitClk.textContent = formatTime(visit.tz);
    if (homeDate) homeDate.textContent = formatDate(home.tz);
    if (visitDate) visitDate.textContent = formatDate(visit.tz);
  }
  // live date in header
  const ld = document.getElementById('live-date');
  if (ld) ld.textContent = new Date().toLocaleString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

// ── INIT
populateSelects();
updateDashboard();
setInterval(tickClocks, 1000);
</script>
